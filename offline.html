<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ふろく.jp - 离线模式</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FAF8F5;color:#3A3A3A;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
    .offline{ma-width:400px}
    .offline-icon{font-size:64px;margin-bottom:24px}
    .offline h1{font-size:24px;font-weight:600;margin-bottom:16px;color:#3A3A3A}
    .offline p{font-size:16px;color:#8A8A8A;line-height:1.8;margin-bottom:32px}
    .offline a{display:inline-block;padding:12px 32px;background:#3A3A3A;color:#FAF8F5;text-decoration:none;border-radius:8px;font-size:14px;transition:background .2s}
    .offline a:hover{background:#D4846C}
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline-icon">📖</div>
    <h1>当前处于离线状态</h1>
    <p>请检查网络连接后重试。<br>部分已缓存的内容仍可访问。</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
