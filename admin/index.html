<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ふろく.jp - 管理后台</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://unpkg.com">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#333}
    .loading{text-align:center}
    .loading p{margin-top:16px;color:#666;font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#333;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>正在加载管理后台...</p>
  </div>
  <!-- Netlify Identity Widget - 用于显示 GitHub OAuth 登录按钮 -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // 初始化 Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
